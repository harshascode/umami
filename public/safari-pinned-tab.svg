<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
  <rect width="200" height="200" fill="#000"/>
  <!-- Left Ear -->
  <ellipse cx="60" cy="45" rx="18" ry="50" fill="#000" transform="rotate(-25 60 45)"/>
  <!-- Right Ear -->
  <ellipse cx="140" cy="45" rx="18" ry="50" fill="#000" transform="rotate(25 140 45)"/>
  <!-- Inner Left Ear -->
  <ellipse cx="60" cy="50" rx="10" ry="35" fill="#FFB6D9" transform="rotate(-25 60 50)"/>
  <!-- Inner Right Ear -->
  <ellipse cx="140" cy="50" rx="10" ry="35" fill="#FFB6D9" transform="rotate(25 140 50)"/>
  <!-- Head -->
  <circle cx="100" cy="110" r="65" fill="#000"/>
  <!-- Face -->
  <circle cx="100" cy="115" r="55" fill="#fff"/>
  <!-- Left Eye -->
  <circle cx="80" cy="100" r="8" fill="#000"/>
  <circle cx="82" cy="98" r="3" fill="#fff"/>
  <!-- Right Eye -->
  <circle cx="120" cy="100" r="8" fill="#000"/>
  <circle cx="122" cy="98" r="3" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="100" cy="115" rx="6" ry="8" fill="#FFB6D9"/>
  <!-- Mouth -->
  <path d="M 100 115 Q 90 125 85 122" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 115 Q 110 125 115 122" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="60" cy="110" r="8" fill="#FFB6D9" opacity="0.5"/>
  <circle cx="140" cy="110" r="8" fill="#FFB6D9" opacity="0.5"/>
</svg>